        .topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px;margin:20px 0}
        .topic-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:25px 15px;border-radius:20px;cursor:pointer;transition:all 0.3s;border:none;font-size:18px;font-weight:bold;box-shadow:0 5px 15px rgba(102,126,234,0.3)}

        .topic-icon{font-size:40px;margin-bottom:10px}
        .direction-selector{margin:25px 0;padding:20px;background:#f8f9fa;border-radius:15px}
        .direction-btn{padding:15px 25px;margin:5px;font-size:16px;cursor:pointer;border:2px solid #667eea;background:white;border-radius:12px;font-weight:600;color:#667eea;transition:all 0.2s}
        .direction-btn.active{background:#667eea;color:white}.direction-btn:hover{transform:scale(1.05)}
        .game-container{display:none}
        .score-box{font-size:18px;color:#667eea;font-weight:bold;margin-bottom:15px;display:flex;justify-content:space-between}

        .word-emoji{font-size:60px;margin:15px 0}
        .speaker-btn{font-size:32px;cursor:pointer;background:#f1f3f5;border:none;border-radius:50%;width:60px;height:60px;margin:10px 0;transition:all 0.2s}
        .speaker-btn:hover{background:#e9ecef;transform:scale(1.1)}
        .options{display:grid;grid-template-columns:1fr;gap:12px;margin-top:20px}
        button.opt-btn{padding:18px;font-size:19px;cursor:pointer;border:2px solid #dee2e6;background:white;border-radius:15px;font-weight:600;color:#495057;transition:all 0.2s}
        button.opt-btn:hover:not(:disabled){border-color:#667eea;transform:translateX(-3px)}
        .attempts-left{font-size:15px;color:#f59f00;margin:10px 0;font-weight:bold}
        .mistake-item{color:#fa5252;margin:10px 0;font-size:17px;padding:12px;background:#fff5f5;border-radius:12px;text-align:right;border-right:4px solid #fa5252}
        .action-btn{background:#667eea;color:white;border:none;padding:16px;width:100%;border-radius:15px;font-size:18px;cursor:pointer;margin-top:10px;font-weight:600;transition:all 0.2s}
        .action-btn:hover{background:#5568d3;transform:translateY(-2px)}
        .action-btn.secondary{background:#37b24d}.action-btn.secondary:hover{background:#2f9e44}
        #feedback{margin-top:15px;font-weight:600;min-height:30px;font-size:18px}

        .back-btn:hover{background:#6c757d}

</head>

    </div>
</div>
<div class="container" id="direction-screen" style="display:none">
    <h2>🔄 בחרו כיוון שאלות</h2>
    <div class="topic-info" id="selected-topic-info"></div>
    <div class="direction-selector">

    </div>
    <button class="action-btn" onclick="startGame()">🎮 התחל משחק!</button>
    <button class="back-btn" onclick="backToTopics()">← חזרה לנושאים</button>
</div>
<div class="container game-container" id="game-screen">

    <div id="word" class="word-display">---</div>
    <div id="word-emoji" class="word-emoji" style="display:none"></div>
    <button class="speaker-btn" onclick="speakWord()" id="speaker">🔊</button>
    <div id="attempts" class="attempts-left">ניסיונות נותרים: 3</div>
    <div class="options" id="options">
        <button class="opt-btn" onclick="checkAnswer(0)">-</button>
        <button class="opt-btn" onclick="checkAnswer(1)">-</button>
        <button class="opt-btn" onclick="checkAnswer(2)">-</button>
        <button class="opt-btn" onclick="checkAnswer(3)">-</button>
    </div>
    <div id="feedback"></div>
    <button class="back-btn" onclick="backToDirection()" style="margin-top:20px">← חזרה</button>
</div>
<div class="container game-container" id="summary-screen">
    <h2 style="color:#667eea">🎊 סיכום סבב</h2>
    <p id="final-score" style="font-size:24px;margin-bottom:20px;font-weight:bold"></p>
    <div id="mistakes-list" style="margin-bottom:20px"></div>

    <button class="action-btn" onclick="resetGame()">🎮 סבב חדש (אותו נושא)</button>
    <button class="back-btn" onclick="backToTopics()">← בחר נושא אחר</button>
</div>
